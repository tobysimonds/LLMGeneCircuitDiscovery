[dataset]
source_type = "geo"
accession = "GSE242230"
annotations_filename = "GSE242230_annotations.txt.gz"
cache_subdir = "gse242230"

[contrast]
groupby_column = "cell_type_specific"
case_labels = ["Malignant - Classical", "Malignant - Basal"]
control_labels = ["Normal Epithelial"]
filter_column = "filtered"
exclude_filtered = true

[qc]
min_genes = 200
max_mt_fraction = 0.2
random_seed = 17

[deg]
top_n = 50
adjusted_pvalue_cutoff = 0.05
min_log2_fold_change = 0.1

[grn]
context = "Pancreatic Ductal Adenocarcinoma"
target_oncogene = "KRAS"
model = "o4-mini-deep-research"
parser_model = "gpt-5-mini"
concurrency = 4
confidence_threshold = 0.35
max_tool_calls = 4
immediate_downstream_effectors = ["RAF1", "BRAF", "MAP2K1", "MAP2K2", "MAPK1", "MAPK3", "PIK3CA", "AKT1"]

[simulation]
knockout_sizes = [1, 2, 3]
max_iterations = 8

[benchmark]
release = "DepMap Public 25Q3"
lineage_filters = ["Pancreas"]
primary_disease_filters = ["Pancreatic"]
effect_threshold = -0.5
